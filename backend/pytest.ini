[pytest]
# Where to look for tests, and how to recognize them.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# No async test functions exist yet (TestClient is synchronous), but
# pytest-asyncio is installed per project convention for when async tests
# (e.g. httpx.AsyncClient-based) are added later — "auto" means such
# tests would work without needing an explicit @pytest.mark.asyncio on
# each one.
asyncio_mode = auto

# These tests hit the real Groq API and real Chroma/Postgres backends
# (see tests/conftest.py) rather than mocks, so failures print the full
# assertion context by default.
addopts = -v
