name: Backend CI

# Runs the real pytest integration suite (see backend/tests/conftest.py)
# against live Chroma (ephemeral, on the runner), Postgres (Supabase-hosted,
# via DATABASE_URL), Groq (via GROQ_API_KEY), and Supabase Auth (via
# SUPABASE_URL/SUPABASE_ANON_KEY, used by the real-token tests in
# test_auth.py) — no mocks, matching this project's testing philosophy.
# That means every run on this workflow consumes real Groq API quota and
# hits a real hosted database; see the repo secrets list in this repo's
# README/PR description for what four secrets this requires, and be aware
# a run can fail from an external rate limit, not just a code regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pytest
